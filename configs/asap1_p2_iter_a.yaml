# ITERATE-A config — epoch budget ablation (ADR-001 rev3 Addendum §4).
#
# Motivation: pilot rev0 (run asap1-p2-deberta_v3_lg-corn-pilot-rev0) finished
# all 4 epochs without early-stop triggering. s42 and s2024 dev-QWK were
# monotonically increasing through epoch 4 (+0.031 and +0.019 gain in the
# last epoch). Classic under-training signal — no plateau observed,
# low inter-seed std (0.022) rules out loss/tokenizer/data-leak pathology.
#
# This config extends the budget to 12 epochs with patience=3. Best-state
# restoration + early stopping make the extra epochs safe (overfitting
# cannot damage the final model). Per-epoch train-QWK is now logged for
# overfitting diagnosis (learning-curve plot rendered by Evaluator).
#
# Fixed stratified 70/15/15 split, split_seed=42 — identical to pilot
# rev0 so results are directly comparable.
#
# Run: asap1-p2-deberta_v3_lg-corn-iter_a_epochs-rev0

run_name:  asap1-p2-deberta_v3_lg-corn-iter_a_epochs-rev0

dataset:
  name:       asap1
  path:       data/training_set_rel3.tsv
  prompts:    [2]

model:
  backbone:   microsoft/deberta-v3-large
  loss:       corn
  num_classes: 6              # ASAP1 Prompt 2: scores 1..6
  dropout:    0.1

training:
  max_length:  768
  batch_size:  16
  grad_accum:  2               # effective batch = 32
  lr:          1.0e-5
  epochs:      12              # was 4 in pilot — see header comment
  warmup_ratio: 0.1
  weight_decay: 0.01
  precision:   bf16
  compile_backbone: false   # torch.compile CUDAGraphs incompat on GB10 (see pilot fix)
  longformer_global: false
  early_stop_patience: 3      # was 2 — tolerate longer plateaus before stopping
  grad_clip:   1.0
  num_workers: 4

# Pilot Phase: fixed stratified 70/15/15 split, 3 training seeds.
# Identical split_seed to rev0 pilot — apples-to-apples comparison.
eval:
  mode:        pilot
  split_seed:  42
  split_ratios: [0.70, 0.15, 0.15]
  seeds:       [42, 123, 2024]

# Retained for Phase 3 (confirmatory 5-fold) per ADR rev3. Ignored in pilot mode.
cv:
  n_splits:  5
  seeds:     [42, 123, 2024]

tracking:
  mlflow_uri:     file:./mlruns
  experiment:     aes-thesis
  log_artifacts:  true

output:
  dir:        runs/asap1-p2-deberta_v3_lg-corn-iter_a_epochs-rev0
